<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuza090 Virtual Arena</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .balance-box { background: #222; padding: 10px; border-radius: 10px; margin: 10px; font-size: 20px; color: #0f0; }
        .bet-btn { background: #f00; color: #fff; padding: 15px; border: none; border-radius: 5px; margin: 5px; width: 40%; font-weight: bold; }
        #video-container { width: 100%; border: 2px solid #333; }
    </style>
</head>
<body>
    <h2>🎮 CHUZA090 ARENA</h2>
    
    <div class="balance-box" id="user-balance">Balance: Loading...</div>

    <div id="video-container">
        <p>🔴 Live Scoreboard Loading...</p>
    </div>

    <div style="margin-top: 20px;">
        <button class="bet-btn" onclick="placeBet(50)">BET ₹50</button>
        <button class="bet-btn" onclick="placeBet(100)">BET ₹100</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');

        // Function to fetch real-time balance
        function updateUIBalance() {
            fetch(`/get_user_data?user_id=${userId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('user-balance').innerText = "Balance: ₹" + data.balance;
                });
        }

        // Function to place bet and sync database
        function placeBet(amount) {
            if(!userId) return alert("User not identified!");
            
            fetch('/place_virtual_bet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, amount: amount })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    alert("Bet Successful! 👍");
                    updateUIBalance(); // Immediate refresh
                } else {
                    alert("Error: " + data.message);
                }
            });
        }

        // Initial Load
        updateUIBalance();
    </script>
</body>
</html>
